<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form-Zap</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="card">

        <div class="barrawhatsapp">
            <img src="../assets/images/icon.png" alt="WhatsApp">
            <span>Empresa</span>
        </div>

        <div class="mensagem">
            <p>
                Olá! Insira seus dados para ser direcionado para o WhatsApp:
            </p>
        </div>

        <form id="formulario">

            <label>Seu nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label>Seu e-mail</label>
            <input type="email" id="email" placeholder="exemplo@email.com">

            <label>Seu WhatsApp</label>
            <input type="text" id="telefone" placeholder="+55 (99) 99999-9999">

            <button type="button" onclick="enviarWhats()">
                Ir para o WhatsApp
            </button>

        </form>

        <div class="footer">
            Powered by Agendor
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
